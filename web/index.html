<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sofrasofra Arena">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sofrasofra Arena">

  <meta name="theme-color" content="#000000">

  <title>Sofrasofra Arena</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
<script>
  (function () {
    const installedKey = 'sofrasofra_pwa_installed_v1';
    const installedAtKey = 'sofrasofra_pwa_installed_at_v1';

    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;

    if (isStandalone) {
      localStorage.setItem(installedKey, 'true');

      if (!localStorage.getItem(installedAtKey)) {
        localStorage.setItem(
          installedAtKey,
          new Date().toISOString()
        );
      }
    }

    window.addEventListener('appinstalled', function () {
      localStorage.setItem(installedKey, 'true');
      localStorage.setItem(
        installedAtKey,
        new Date().toISOString()
      );

      console.log('SOFRASOFRA PWA INSTALL DETECTED');
    });
  })();
</script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
